<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小说改编 AI 漫剧制作清单</title>
  <style>
    :root {
      --bg: #f5efe7;
      --bg-soft: #fbf8f2;
      --card: rgba(255, 252, 247, 0.92);
      --card-strong: #fffaf4;
      --line: #d8c7af;
      --line-strong: #bda47f;
      --text: #3a2e24;
      --muted: #7b6b5c;
      --accent: #8b5e34;
      --accent-soft: #efe0cb;
      --accent-deep: #65411f;
      --ok: #2c7a5d;
      --warn: #af6e1d;
      --danger: #b24937;
      --shadow: 0 18px 48px rgba(84, 56, 27, 0.10);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --font-sans: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
      --font-serif: "Songti SC", "STSong", "Noto Serif CJK SC", serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-sans);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 243, 221, 0.95), transparent 35%),
        radial-gradient(circle at top right, rgba(215, 191, 160, 0.35), transparent 28%),
        linear-gradient(180deg, #f6f0e8 0%, #efe4d5 100%);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
      color: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
      border-radius: 999px;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .page {
      width: min(1480px, calc(100vw - 18px));
      margin: 10px auto 24px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 20px;
      border: 1px solid rgba(189, 164, 127, 0.55);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(135deg, rgba(255, 249, 239, 0.95), rgba(245, 233, 217, 0.92)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.65), rgba(255, 255, 255, 0));
      box-shadow: var(--shadow);
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -40px -70px auto;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139, 94, 52, 0.16), transparent 65%);
      pointer-events: none;
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .hero-copy h1 {
      margin: 0;
      font-family: var(--font-serif);
      font-size: clamp(2rem, 3vw, 3rem);
      letter-spacing: 0.04em;
      color: var(--accent-deep);
    }

    .hero-copy p {
      margin: 8px 0 0;
      max-width: 760px;
      line-height: 1.6;
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      min-width: 320px;
    }

    .btn {
      padding: 9px 14px;
      background: #fff8ef;
      color: var(--accent-deep);
      border: 1px solid rgba(139, 94, 52, 0.16);
      box-shadow: 0 8px 18px rgba(137, 92, 49, 0.08);
    }

    .btn:hover {
      box-shadow: 0 12px 24px rgba(137, 92, 49, 0.12);
    }

    .btn.primary {
      background: linear-gradient(135deg, #8b5e34, #6f4927);
      color: #fffaf5;
      box-shadow: 0 12px 28px rgba(111, 73, 39, 0.25);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 253, 249, 0.88);
      border: 1px solid rgba(189, 164, 127, 0.5);
      color: var(--muted);
      white-space: nowrap;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--warn);
      box-shadow: 0 0 0 5px rgba(175, 110, 29, 0.12);
    }

    .status-pill[data-state="saved"] .status-dot {
      background: var(--ok);
      box-shadow: 0 0 0 5px rgba(44, 122, 93, 0.12);
    }

    .status-pill[data-state="error"] .status-dot {
      background: var(--danger);
      box-shadow: 0 0 0 5px rgba(178, 73, 55, 0.12);
    }

    .overview {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .metric {
      padding: 12px 14px;
      border-radius: var(--radius-lg);
      background: rgba(255, 250, 243, 0.82);
      border: 1px solid rgba(189, 164, 127, 0.38);
    }

    .metric-label {
      display: block;
      margin-bottom: 4px;
      font-size: 0.84rem;
      color: var(--muted);
    }

    .metric-value {
      font-size: clamp(0.96rem, 1.8vw, 1.3rem);
      font-weight: 700;
      color: var(--accent-deep);
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 14px;
      position: sticky;
      top: 0;
      z-index: 8;
      backdrop-filter: blur(8px);
    }

    .tab {
      flex: 0 0 auto;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 248, 238, 0.78);
      color: var(--muted);
      border: 1px solid rgba(189, 164, 127, 0.32);
    }

    .tab.active {
      background: linear-gradient(135deg, #7c532c, #9b6a3d);
      color: #fffaf4;
      box-shadow: 0 12px 24px rgba(109, 71, 37, 0.22);
    }

    .panel {
      display: grid;
      gap: 12px;
    }

    .card,
    .repeatable-card {
      border: 1px solid rgba(189, 164, 127, 0.4);
      border-radius: var(--radius-xl);
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .card {
      padding: 16px;
    }

    .section-title {
      margin: 0 0 4px;
      font-size: 1.08rem;
      font-family: var(--font-serif);
      color: var(--accent-deep);
    }

    .section-subtitle {
      margin: 0 0 12px;
      line-height: 1.55;
      color: var(--muted);
    }

    .form-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .form-grid.one {
      grid-template-columns: 1fr;
    }

    .form-grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .field {
      display: grid;
      gap: 6px;
      align-content: start;
    }

    .field.full-span {
      grid-column: 1 / -1;
    }

    .field > span,
    .field-title {
      font-size: 0.86rem;
      font-weight: 700;
      color: var(--accent-deep);
    }

    .field input[type="text"],
    .field input[type="number"],
    .field textarea,
    .field select {
      width: 100%;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(189, 164, 127, 0.6);
      background: var(--card-strong);
      color: var(--text);
      outline: none;
      transition: border-color 0.16s ease, box-shadow 0.16s ease;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: rgba(139, 94, 52, 0.82);
      box-shadow: 0 0 0 4px rgba(139, 94, 52, 0.12);
    }

    .field textarea {
      min-height: 92px;
      resize: vertical;
      line-height: 1.55;
    }

    .hint {
      margin-top: 10px;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .repeatable-list {
      display: grid;
      gap: 10px;
    }

    .repeatable-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .repeatable-head .btn {
      flex: 0 0 auto;
    }

    .repeatable-card {
      overflow: hidden;
    }

    .repeatable-summary {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 12px 16px;
      background: linear-gradient(180deg, rgba(255, 248, 238, 0.92), rgba(255, 248, 238, 0.72));
      border-bottom: 1px solid rgba(189, 164, 127, 0.34);
    }

    .repeatable-summary h3 {
      margin: 0;
      font-size: 0.95rem;
      color: var(--accent-deep);
    }

    .repeatable-summary p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.45;
    }

    .repeatable-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }

    .repeatable-actions .btn {
      padding: 7px 10px;
      font-size: 0.84rem;
    }

    .repeatable-body {
      padding: 14px 16px 16px;
      display: grid;
      gap: 14px;
    }

    .repeatable-card.collapsed .repeatable-body {
      display: none;
    }

    .check-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .check-group {
      padding: 12px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(189, 164, 127, 0.34);
      background: rgba(255, 252, 247, 0.82);
    }

    .check-group h4 {
      margin: 0 0 8px;
      font-size: 1rem;
      color: var(--accent-deep);
    }

    .check-item,
    .toggle-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      margin: 8px 0;
    }

    .check-item input,
    .toggle-row input {
      accent-color: var(--accent);
      margin-top: 4px;
    }

    .check-item span,
    .toggle-row span {
      line-height: 1.55;
    }

    .image-panel {
      display: grid;
      gap: 10px;
    }

    .image-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .upload-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 11px 16px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-deep);
      border: 1px solid rgba(139, 94, 52, 0.16);
      cursor: pointer;
    }

    .image-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    }

    .image-card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(189, 164, 127, 0.42);
      background: rgba(255, 255, 255, 0.85);
      min-height: 160px;
    }

    .image-card img {
      display: block;
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: #f1e5d6;
    }

    .image-card footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
    }

    .image-card strong {
      display: block;
      font-size: 0.88rem;
      color: var(--accent-deep);
      word-break: break-all;
    }

    .image-card button {
      padding: 8px 10px;
      background: rgba(178, 73, 55, 0.12);
      color: var(--danger);
      border: 1px solid rgba(178, 73, 55, 0.15);
    }

    .empty-state {
      padding: 14px;
      border: 1px dashed rgba(189, 164, 127, 0.7);
      border-radius: var(--radius-lg);
      background: rgba(255, 250, 243, 0.62);
      color: var(--muted);
    }

    .notice {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: var(--radius-lg);
      background: rgba(239, 224, 203, 0.65);
      color: var(--accent-deep);
      line-height: 1.65;
      border: 1px solid rgba(189, 164, 127, 0.32);
    }

    .footer-note {
      margin-top: 12px;
      text-align: center;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .mini-table {
      display: grid;
      gap: 10px;
    }

    .mini-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr)) 120px 120px;
      gap: 8px;
      align-items: end;
      padding: 10px 12px;
      border-radius: var(--radius-lg);
      background: rgba(255, 252, 247, 0.88);
      border: 1px solid rgba(189, 164, 127, 0.34);
    }

    .mini-row.five {
      grid-template-columns: repeat(5, minmax(0, 1fr)) 120px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(139, 94, 52, 0.12);
      color: var(--accent-deep);
      font-size: 0.82rem;
    }

    .pill-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .quick-index {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .quick-chip {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(189, 164, 127, 0.36);
      background: rgba(255, 248, 238, 0.72);
      color: var(--accent-deep);
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .quick-chip:hover {
      box-shadow: 0 8px 18px rgba(137, 92, 49, 0.10);
    }

    @media (max-width: 1024px) {
      .hero-top {
        flex-direction: column;
      }

      .toolbar {
        justify-content: flex-start;
        min-width: 0;
      }

      .form-grid,
      .form-grid.three,
      .mini-row,
      .mini-row.five {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .page {
        width: min(100vw - 18px, 100%);
        margin: 10px auto 24px;
      }

      .hero,
      .card,
      .repeatable-body {
        padding: 18px;
      }

      .repeatable-summary {
        padding: 16px 18px;
        flex-direction: column;
        align-items: flex-start;
      }

      .repeatable-actions {
        width: 100%;
        justify-content: flex-start;
      }
    }

    @media print {
      body {
        background: #fff;
      }

      .page {
        width: 100%;
        margin: 0;
      }

      .hero,
      .card,
      .repeatable-card {
        box-shadow: none;
        border-color: #ddd;
        background: #fff;
      }

      .toolbar,
      .tabs,
      .status-pill,
      .repeatable-actions,
      .upload-label,
      .image-card button,
      .footer-note {
        display: none !important;
      }

      .repeatable-body {
        display: grid !important;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <input id="import-input" type="file" accept="application/json" hidden>
  <script>
    (function () {
      const STORAGE_KEY = "novel-manga-checklist-yaorao-first3-v1";
      const APP_VERSION = 1;
      const APP_TITLE = "小说改编 AI 漫剧制作清单";
      const SAMPLE_HASH = "#yaorao-volume1";
      const app = document.getElementById("app");
      const importInput = document.getElementById("import-input");

      const tabs = [
        { id: "projectInfo", label: "项目基础信息" },
        { id: "workflow", label: "制作流程" },
        { id: "episodes", label: "章节改编" },
        { id: "characters", label: "角色设定" },
        { id: "scenes", label: "场景设定" },
        { id: "props", label: "道具特效" },
        { id: "storyboards", label: "分镜脚本" },
        { id: "prompts", label: "Prompt 模板" },
        { id: "voiceLines", label: "配音台词" },
        { id: "audio", label: "音乐音效" },
        { id: "editing", label: "剪辑执行" },
        { id: "quality", label: "质量检查" },
        { id: "demoChecklist", label: "Demo 开工版" }
      ];

      const collectionFactories = {
        "episodes": () => createEpisode(),
        "characters": () => createCharacter(),
        "scenes": () => createScene(),
        "props": () => createProp(),
        "storyboards": (arr) => createStoryboard(arr.length + 1),
        "voiceLines": (arr) => createVoiceLine(arr.length + 1),
        "audio.backgroundMusic": () => createBgmRow()
      };

      let saveStateLabel = "saved";
      let saveMessage = "已载入本地数据";
      let activeTab = "projectInfo";
      let saveTimer = null;
      let state = loadInitialState();

      function uid(prefix) {
        return prefix + "-" + Math.random().toString(36).slice(2, 10) + "-" + Date.now().toString(36);
      }

      function deepClone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function createChecklist(labels) {
        return labels.map((label) => ({ id: uid("chk"), label, done: false }));
      }

      function createProjectInfo() {
        return {
          projectName: "",
          novelName: "",
          chapterRange: "",
          episodePlan: "",
          episodeDuration: "",
          ratio: "竖屏 9:16",
          targetPlatforms: "抖音 / B站 / 小红书 / 视频号",
          style: "",
          audience: "",
          updateFrequency: ""
        };
      }

      function createEpisode() {
        return {
          id: uid("episode"),
          collapsed: false,
          volumeName: "",
          chapterName: "",
          sourceRange: "",
          targetDuration: "",
          logline: "",
          highlights: "",
          openingEmotion: "",
          middleEmotion: "",
          climaxEmotion: "",
          endingEmotion: "",
          notes: ""
        };
      }

      function createCharacter() {
        return {
          id: uid("character"),
          collapsed: false,
          name: "",
          identity: "",
          ageAppearance: "",
          keywords: "",
          positioning: "主角",
          appearance: "",
          outfit: "",
          color: "",
          expressions: "",
          actions: "",
          voiceType: "少女音",
          prompt: "",
          prepItems: createChecklist([
            "正面图",
            "侧面图",
            "背面图",
            "微笑表情",
            "生气表情",
            "惊讶表情",
            "悲伤表情",
            "战斗/施法姿势",
            "抱人/回头/奔跑动作"
          ]),
          images: []
        };
      }

      function createScene() {
        return {
          id: uid("scene"),
          collapsed: false,
          name: "",
          purpose: "开场",
          description: "",
          time: "白天",
          mood: "温馨",
          visualStyle: "",
          colorKeywords: "",
          prompt: "",
          prepItems: createChecklist([
            "主场景全景",
            "主场景中景",
            "主场景近景",
            "白天版本",
            "夜晚版本",
            "特效版本（下雨/起雾/光束/火焰）"
          ]),
          images: []
        };
      }

      function createProp() {
        return {
          id: uid("prop"),
          collapsed: false,
          name: "",
          owner: "",
          useCase: "",
          appearance: "",
          material: "",
          effect: "",
          prompt: "",
          images: []
        };
      }

      function createStoryboard(index) {
        return {
          id: uid("shot"),
          collapsed: false,
          shotNumber: String(index).padStart(2, "0"),
          timing: "",
          shotSize: "",
          visual: "",
          action: "",
          dialogue: "",
          audio: "",
          note: "",
          images: []
        };
      }

      function createVoiceLine(index) {
        return {
          id: uid("voice"),
          collapsed: false,
          sequence: String(index).padStart(2, "0"),
          role: "",
          content: "",
          emotion: "",
          duration: "",
          recorded: false
        };
      }

      function createBgmRow() {
        return {
          id: uid("bgm"),
          scene: "",
          musicType: "",
          purpose: "",
          ready: false,
          notes: ""
        };
      }

      function createFolder() {
        return {
          id: uid("folder"),
          name: "",
          note: ""
        };
      }

      function createPromptBlocks() {
        return {
          character: {
            name: "",
            prompt: "A beautiful ancient Chinese fantasy character, anime style, elegant face, expressive eyes, cinematic lighting, full body character sheet, front side back view, high detail",
            negative: "low quality, blurry, ugly face, extra fingers, bad anatomy, inconsistent costume, duplicate limbs"
          },
          scene: {
            name: "",
            prompt: "Ancient Chinese fantasy environment, soft anime style, cinematic composition, atmospheric light, layered depth, beautiful and immersive world building, high detail",
            negative: "horror, ugly, dark gore, low quality, blurry, messy composition"
          },
          shot: {
            name: "",
            prompt: "Close-up shot of the main character, warm anime style, cinematic composition, consistent character design, soft light, ancient Chinese fantasy aesthetic",
            negative: ""
          }
        };
      }

      function createWorkflowTemplate() {
        return {
          planning: createChecklist([
            "确定改编章节",
            "确定单集时长",
            "确定改编方式（旁白型 / 对话型 / 高燃剪辑型）",
            "确定整体画风",
            "确定角色视觉统一方案",
            "确定制作工具（Gemini / 剪映 / Runway / 其他）"
          ]),
          adaptation: createChecklist([
            "提炼章节梗概",
            "拆分关键剧情点",
            "删减不适合视频化的文字",
            "补充适合视觉表达的动作/镜头",
            "生成分镜脚本",
            "整理旁白和台词"
          ]),
          visuals: createChecklist([
            "生成人物三视图",
            "生成人物表情图",
            "生成关键动作图",
            "生成场景图",
            "生成道具/灵兽/特效图",
            "统一角色脸部和服装细节"
          ]),
          audio: createChecklist([
            "整理角色台词",
            "整理旁白文案",

      function shouldUpgradeEmptyState(candidate) {
        if (!candidate || typeof candidate !== "object") {
          return false;
        }
        const project = candidate.projectInfo || {};
        const episode = Array.isArray(candidate.episodes) && candidate.episodes[0] ? candidate.episodes[0] : {};
        const character = Array.isArray(candidate.characters) && candidate.characters[0] ? candidate.characters[0] : {};
        const storyboard = Array.isArray(candidate.storyboards) && candidate.storyboards[0] ? candidate.storyboards[0] : {};
        return !project.projectName &&
          !project.novelName &&
          !project.chapterRange &&
          !episode.chapterName &&
          !episode.logline &&
          !character.name &&
          !storyboard.visual;
      }

      function shouldForceSampleFromHash() {
        const hash = String(window.location.hash || "").toLowerCase();
        return hash === SAMPLE_HASH || hash === "#yaorao-first3";
      }

      function loadYaoraoSampleState(sourceLabel) {
        const seeded = createDefaultState("template");
        seeded.meta.lastSavedAt = new Date().toISOString();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(seeded));
        saveStateLabel = "saved";
        saveMessage = sourceLabel || "已载入《妖娆召唤师》第一卷示例";
        return seeded;
      }

      function normalizeChecklistArray(list, fallback) {
        if (!Array.isArray(list) || list.length === 0) {
          return deepClone(fallback);
        }
        return list.map((item, index) => ({
          id: item && item.id ? String(item.id) : uid("chk"),
          label: item && item.label ? String(item.label) : (fallback[index] ? fallback[index].label : "待办项"),
          done: !!(item && item.done)
        }));
      }

      function normalizeImages(images) {
        if (!Array.isArray(images)) {
          return [];
        }
        return images
          .filter((item) => item && typeof item.dataUrl === "string" && item.dataUrl.startsWith("data:image"))
          .map((item) => ({
            id: item.id ? String(item.id) : uid("img"),
            name: item.name ? String(item.name) : "未命名图片",
            dataUrl: item.dataUrl
          }));
      }

      function normalizeRepeatable(list, fallback, factory) {
        if (!Array.isArray(list) || list.length === 0) {
          return deepClone(fallback);
        }
        return list.map((item, index) => {
          const base = factory(index + 1);
          const merged = Object.assign({}, base, item || {});
          if (base.prepItems) {
            merged.prepItems = normalizeChecklistArray(item && item.prepItems, base.prepItems);
          }
          if (base.images || item && item.images) {
            merged.images = normalizeImages(item && item.images);
          }
          merged.id = item && item.id ? String(item.id) : base.id;
          merged.collapsed = !!(item && item.collapsed);
          return merged;
        });
      }

      function normalizeGroupedChecklist(groups, fallback) {
        const next = {};
        Object.keys(fallback).forEach((key) => {
          if (Array.isArray(fallback[key])) {
            next[key] = normalizeChecklistArray(groups && groups[key], fallback[key]);
          } else {
            next[key] = fallback[key];
          }
        });
        return next;
      }

      function normalizePrompts(prompts, fallback) {
        const next = {};
        Object.keys(fallback).forEach((key) => {
          next[key] = Object.assign({}, fallback[key], prompts && prompts[key] ? prompts[key] : {});
        });
        return next;
      }

      function normalizeState(input) {
        const fallback = createDefaultState("template");
        const candidate = input && typeof input === "object" ? input : {};
        return {
          projectInfo: Object.assign({}, fallback.projectInfo, candidate.projectInfo || {}),
          workflow: normalizeGroupedChecklist(candidate.workflow, fallback.workflow),
          episodes: normalizeRepeatable(candidate.episodes, fallback.episodes, createEpisode),
          characters: normalizeRepeatable(candidate.characters, fallback.characters, createCharacter),
          scenes: normalizeRepeatable(candidate.scenes, fallback.scenes, createScene),
          props: normalizeRepeatable(candidate.props, fallback.props, createProp),
          storyboards: normalizeRepeatable(candidate.storyboards, fallback.storyboards, createStoryboard),
          prompts: normalizePrompts(candidate.prompts, fallback.prompts),
          voiceLines: normalizeRepeatable(candidate.voiceLines, fallback.voiceLines, createVoiceLine),
          audio: {
            backgroundMusic: normalizeRepeatable(candidate.audio && candidate.audio.backgroundMusic, fallback.audio.backgroundMusic, createBgmRow),
            effects: normalizeChecklistArray(candidate.audio && candidate.audio.effects, fallback.audio.effects),
            narrationChecks: normalizeChecklistArray(candidate.audio && candidate.audio.narrationChecks, fallback.audio.narrationChecks),

          meta: Object.assign({}, fallback.meta, candidate.meta || {}, { version: APP_VERSION })

      }

      function loadInitialState() {
        try {
          if (shouldForceSampleFromHash()) {
            return loadYaoraoSampleState("已按链接载入《妖娆召唤师》第一卷示例");
          }
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) {
            saveStateLabel = "saved";
            saveMessage = "已载入默认模板";
            return createDefaultState("template");
          }
          const parsed = JSON.parse(raw);
          if (shouldUpgradeEmptyState(parsed)) {
            return loadYaoraoSampleState("已升级为空白页的《妖娆召唤师》第一卷示例");
          }
          saveStateLabel = "saved";
          saveMessage = "已载入本地数据";
          return normalizeState(parsed);
        } catch (error) {
          console.warn("加载本地数据失败", error);
          saveStateLabel = "error";
          saveMessage = "本地数据损坏，已回退到默认模板";
          return createDefaultState("template");
        }
      }

      function saveState() {
        state.meta.lastSavedAt = new Date().toISOString();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        saveStateLabel = "saved";
        saveMessage = "已自动保存 " + formatTimestamp(state.meta.lastSavedAt);
        updateSaveIndicator();
      }

      function markDirty() {
        saveStateLabel = "pending";
        saveMessage = "正在保存变更...";
        updateSaveIndicator();
      }

      function queueSave() {
        markDirty();
        if (saveTimer) {
          clearTimeout(saveTimer);
        }
        saveTimer = setTimeout(function () {
          try {
            saveState();
          } catch (error) {
            console.warn("保存失败", error);
            saveStateLabel = "error";
            saveMessage = "保存失败，请导出 JSON 备份后减少图片体积";
            updateSaveIndicator();
          }
        }, 320);
      }

      function formatTimestamp(value) {
        if (!value) {
          return "--";
        }
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return value;
        }
        return date.toLocaleString("zh-CN", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        });
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function getByPath(object, path) {
        return path.split(".").reduce((acc, key) => {
          if (acc == null) {
            return undefined;
          }
          return acc[key];
        }, object);
      }

      function setByPath(object, path, value) {
        const keys = path.split(".");
        let target = object;
        for (let index = 0; index < keys.length - 1; index += 1) {
          target = target[keys[index]];
        }
        target[keys[keys.length - 1]] = value;
      }

      function countBooleans(value) {
        if (typeof value === "boolean") {
          return { total: 1, done: value ? 1 : 0 };
        }
        if (!value || typeof value !== "object") {
          return { total: 0, done: 0 };
        }
        if (Array.isArray(value)) {
          return value.reduce((acc, item) => {
            const result = countBooleans(item);
            acc.total += result.total;
            acc.done += result.done;
            return acc;
          }, { total: 0, done: 0 });
        }
        return Object.keys(value).reduce((acc, key) => {
          const result = countBooleans(value[key]);
          acc.total += result.total;
          acc.done += result.done;
          return acc;
        }, { total: 0, done: 0 });
      }

      function getProgressStats() {
        const groups = [
          state.workflow,
          state.audio.effects,
          state.audio.narrationChecks,
          state.audio.voiceChecks,
          state.editing,
          state.quality,
          state.demoChecklist,
          state.characters.map((item) => item.prepItems),
          state.scenes.map((item) => item.prepItems),
          state.audio.backgroundMusic.map((item) => item.ready),
          state.voiceLines.map((item) => item.recorded)
        ];
        const summary = groups.reduce((acc, item) => {
          const result = countBooleans(item);
          acc.total += result.total;
          acc.done += result.done;
          return acc;
        }, { total: 0, done: 0 });
        const percentage = summary.total ? Math.round(summary.done / summary.total * 100) : 0;
        return {
          total: summary.total,
          done: summary.done,
          pending: Math.max(summary.total - summary.done, 0),
          percentage: percentage
        };
      }

        const opts = options || {};

        if (opts.type === "textarea") {
          return '<label class="' + className + '"><span>' + escapeHtml(label) + '</span><textarea data-path="' + escapeHtml(path) + '"' + placeholder + '>' + escapeHtml(value) + '</textarea></label>';
        }
        if (opts.type === "select") {
          const optionMarkup = (opts.items || []).map((item) => {
            const option = typeof item === "string" ? { value: item, label: item } : item;
            const selected = option.value === value ? " selected" : "";
            return '<option value="' + escapeHtml(option.value) + '"' + selected + '>' + escapeHtml(option.label) + "</option>";
          }).join("");
          return '<label class="' + className + '"><span>' + escapeHtml(label) + '</span><select data-path="' + escapeHtml(path) + '">' + optionMarkup + "</select></label>";
        }
        return '<label class="' + className + '"><span>' + escapeHtml(label) + '</span><input type="text" data-path="' + escapeHtml(path) + '" value="' + escapeHtml(value) + '"' + placeholder + "></label>";
      }

          renderItem: function (item, index) {
            const title = (item.sequence || String(index + 1).padStart(2, "0")) + " / " + (item.role || "未命名角色");
            const subtitle = [item.emotion, item.duration, item.recorded ? "已录制" : "未录制"].filter(Boolean).join(" / ");
            return renderRepeatableCard("voiceLines", index, item, title, subtitle,
              '<div class="form-grid three">' +
              renderField("序号", "voiceLines." + index + ".sequence", item.sequence, { placeholder: "01" }) +
              renderField("角色", "voiceLines." + index + ".role", item.role, { placeholder: "旁白 / 父亲 / 女主" }) +
              renderField("情绪", "voiceLines." + index + ".emotion", item.emotion, { placeholder: "紧张 / 激动 / 低沉" }) +
              renderField("时长", "voiceLines." + index + ".duration", item.duration, { placeholder: "4s" }) +
              renderField("台词内容", "voiceLines." + index + ".content", item.content, { type: "textarea", full: true, placeholder: "输入完整台词或旁白" }) +
              '</div><label class="toggle-row"><input type="checkbox" data-path="voiceLines.' + index + '.recorded"' + (item.recorded ? " checked" : "") + '><span>是否已录制</span></label>'
            );
          }
        }) + '<section class="card"><h2 class="section-title">旁白与配音检查</h2><div class="check-grid">' +
          renderChecklistGroup("旁白检查项", "audio.narrationChecks", state.audio.narrationChecks) +
          renderChecklistGroup("配音检查项", "audio.voiceChecks", state.audio.voiceChecks) +
          "</div></section>";
      }

      function renderAudioRow(item, index) {
        return '<div class="mini-row five">' +
          renderField("场景", "audio.backgroundMusic." + index + ".scene", item.scene, { placeholder: "开场 / 高潮" }) +
          renderField("音乐类型", "audio.backgroundMusic." + index + ".musicType", item.musicType, { placeholder: "神秘古风 / 激烈史诗" }) +
          renderField("用途", "audio.backgroundMusic." + index + ".purpose", item.purpose, { placeholder: "建立氛围 / 冲突爆发" }) +
          renderField("备注", "audio.backgroundMusic." + index + ".notes", item.notes, { placeholder: "收尾留白、是否要鼓点" }) +
          '<label class="toggle-row"><input type="checkbox" data-path="audio.backgroundMusic.' + index + '.ready"' + (item.ready ? " checked" : "") + '><span>已准备</span></label>' +
          '<div class="repeatable-actions"><button class="btn" data-action="duplicate-item" data-collection="audio.backgroundMusic" data-index="' + escapeHtml(String(index)) + '">复制</button><button class="btn" data-action="delete-item" data-collection="audio.backgroundMusic" data-index="' + escapeHtml(String(index)) + '">删除</button></div>' +
          "</div>";
      }

      function renderAudioTab() {
        return '<section class="card"><div class="repeatable-head"><div><h2 class="section-title">背景音乐清单</h2><p class="section-subtitle">这里可以继续往下补更多场景音乐，适合按场景或情绪分类管理。</p></div><button class="btn primary" data-action="add-item" data-collection="audio.backgroundMusic">新增音乐项</button></div><div class="mini-table">' +
          state.audio.backgroundMusic.map(renderAudioRow).join("") +
          '</div></section><section class="card"><h2 class="section-title">音效清单</h2><div class="check-grid">' +
          renderChecklistGroup("音效准备", "audio.effects", state.audio.effects) +
          '</div></section>';
      }

      function renderEditingTab() {
        return '<section class="card"><h2 class="section-title">剪辑执行清单</h2><p class="section-subtitle">把素材导入、动态效果、字幕、音频和导出设置分开跟踪，能更快定位卡点。</p><div class="check-grid">' +
          renderChecklistGroup("画面处理", "editing.visuals", state.editing.visuals) +
          renderChecklistGroup("字幕处理", "editing.subtitles", state.editing.subtitles) +
          renderChecklistGroup("音频处理", "editing.audio", state.editing.audio) +
          renderChecklistGroup("导出设置", "editing.exportSettings", state.editing.exportSettings) +
          "</div></section>";
      }

      function renderQualityTab() {
        return '<section class="card"><h2 class="section-title">质量检查清单</h2><p class="section-subtitle">出片前最后一轮巡检。这里越完整，返工概率越低。</p><div class="check-grid">' +
          renderChecklistGroup("内容检查", "quality.content", state.quality.content) +
          renderChecklistGroup("视觉检查", "quality.visual", state.quality.visual) +
          renderChecklistGroup("音频检查", "quality.audio", state.quality.audio) +
          renderChecklistGroup("发布检查", "quality.release", state.quality.release) +
          "</div></section>";
      }

      function renderDemoChecklistTab() {
        return '<section class="card"><h2 class="section-title">最简开工版</h2><p class="section-subtitle">如果你先想跑一个 Demo，可以只盯住下面这些关键件，尽快从“文案”进到“成片”。</p><div class="check-grid">' +
          renderChecklistGroup("Demo 必要项", "demoChecklist", state.demoChecklist) +
          '</div><div class="notice">这个模块很适合配合“章节改编”和“分镜脚本”一起使用。先确保 Demo 核心链路跑通，再慢慢补足角色、场景和特效细节。</div></section>';
      }

      function renderActiveTab() {
        switch (activeTab) {
          case "projectInfo": return renderProjectInfoTab();
          case "workflow": return renderWorkflowTab();
          case "episodes": return renderEpisodesTab();
          case "characters": return renderCharactersTab();
          case "scenes": return renderScenesTab();
          case "props": return renderPropsTab();
          case "storyboards": return renderStoryboardsTab();
          case "prompts": return renderPromptsTab();
          case "voiceLines": return renderVoiceLinesTab();
          case "audio": return renderAudioTab();
          case "editing": return renderEditingTab();
          case "quality": return renderQualityTab();
          case "demoChecklist": return renderDemoChecklistTab();
          default: return renderProjectInfoTab();
        }
      }

      function renderOverview() {
        const stats = getProgressStats();
        const projectName = state.projectInfo.projectName || "未命名项目";
        const novelName = state.projectInfo.novelName || "待填写";
        const chapterRange = state.projectInfo.chapterRange || "待填写";
        const ratio = state.projectInfo.ratio || "待填写";
        const platforms = state.projectInfo.targetPlatforms || "待填写";
        return '<section class="overview">' +
          '<article class="metric"><span class="metric-label">项目名称</span><span class="metric-value">' + escapeHtml(projectName) + '</span></article>' +
          '<article class="metric"><span class="metric-label">小说名称</span><span class="metric-value">' + escapeHtml(novelName) + '</span></article>' +
          '<article class="metric"><span class="metric-label">改编章节范围</span><span class="metric-value">' + escapeHtml(chapterRange) + '</span></article>' +
          '<article class="metric"><span class="metric-label">视频比例</span><span class="metric-value">' + escapeHtml(ratio) + '</span></article>' +
          '<article class="metric"><span class="metric-label">目标平台</span><span class="metric-value">' + escapeHtml(platforms) + '</span></article>' +
          '<article class="metric"><span class="metric-label">总进度</span><span class="metric-value">' + stats.percentage + '%</span></article>' +
          '<article class="metric"><span class="metric-label">已完成项</span><span class="metric-value">' + stats.done + '</span></article>' +
          '<article class="metric"><span class="metric-label">未完成项</span><span class="metric-value">' + stats.pending + '</span></article>' +
          "</section>";
      }

      function renderTabs() {
        return '<nav class="tabs">' + tabs.map((tab) => {
          const active = tab.id === activeTab ? " active" : "";
          return '<button class="tab' + active + '" data-action="switch-tab" data-tab="' + escapeHtml(tab.id) + '">' + escapeHtml(tab.label) + "</button>";
        }).join("") + "</nav>";
      }

      function renderApp() {
        document.title = APP_TITLE;
        app.innerHTML = '<div class="page"><header class="hero"><div class="hero-top"><div class="hero-copy"><h1>' + APP_TITLE + '</h1><p>一个单文件、可离线使用的漫剧制作工作台。你可以在这里持续补充章节改编、角色设定、场景与分镜内容，也可以上传本地图片做素材预览，并把整个项目导出成 JSON 继续接力。</p></div><div class="toolbar"><button class="btn" data-action="load-yaorao-sample">载入第一卷示例</button><button class="btn" data-action="new-blank">新建空白项目</button><button class="btn" data-action="reset-template">恢复默认模板</button><button class="btn" data-action="export-json">导出 JSON</button><button class="btn" data-action="import-json">导入 JSON</button><button class="btn primary" data-action="print-page">打印 / 导出 PDF</button><div id="save-status" class="status-pill" data-state="' + escapeHtml(saveStateLabel) + '"><span class="status-dot"></span><span class="status-text">' + escapeHtml(saveMessage) + '</span></div></div></div>' + renderOverview() + renderTabs() + '</header><main class="panel">' + renderActiveTab() + '</main><div class="footer-note">提示：图片会以浏览器本地数据形式保存。若上传很多大图，建议定期导出 JSON 备份。</div></div>';
        autoResizeTextareas();
      }

      function refreshAfterStructureChange() {
        queueSave();
        renderApp();
      }

      function duplicateCollectionItem(collectionPath, index) {
        const collection = getByPath(state, collectionPath);
        if (!Array.isArray(collection) || !collection[index]) {
          return;
        }
        const copy = deepClone(collection[index]);
        copy.id = uid("copy");
        collection.splice(index + 1, 0, copy);
        refreshAfterStructureChange();
      }

      function addCollectionItem(collectionPath) {
        const collection = getByPath(state, collectionPath);
        if (!Array.isArray(collection) || !collectionFactories[collectionPath]) {
          return;
        }
        collection.push(collectionFactories[collectionPath](collection));
        refreshAfterStructureChange();
      }

      function deleteCollectionItem(collectionPath, index) {
        const collection = getByPath(state, collectionPath);
        if (!Array.isArray(collection) || !collection[index]) {
          return;
        }
        if (!window.confirm("确定删除这一条吗？")) {
          return;
        }
        collection.splice(index, 1);
        if (collection.length === 0 && collectionFactories[collectionPath]) {
          collection.push(collectionFactories[collectionPath](collection));
        }
        refreshAfterStructureChange();
      }

      function toggleCollapsed(collectionPath, index) {
        const collection = getByPath(state, collectionPath);
        if (!Array.isArray(collection) || !collection[index]) {
          return;
        }
        collection[index].collapsed = !collection[index].collapsed;
        refreshAfterStructureChange();
      }

      function removeImage(collectionPath, index, imageIndex) {
        const collection = getByPath(state, collectionPath);
        if (!Array.isArray(collection) || !collection[index] || !Array.isArray(collection[index].images)) {
          return;
        }
        collection[index].images.splice(imageIndex, 1);
        refreshAfterStructureChange();
      }

      function updateField(path, value, rerender) {
        setByPath(state, path, value);
        queueSave();
        if (rerender) {
          renderApp();
        }
      }

      function exportJson() {
        const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "novel-manga-checklist-" + new Date().toISOString().slice(0, 10) + ".json";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function importJson(file) {
        if (!file) {
          return;
        }
        const reader = new FileReader();
        reader.onload = function (event) {
          try {
            const imported = JSON.parse(event.target.result);
            if (!window.confirm("导入会覆盖当前页面里的内容，确定继续吗？")) {
              return;
            }
            state = normalizeState(imported);
            saveStateLabel = "saved";
            saveMessage = "已导入 JSON 数据";
            queueSave();
            renderApp();
          } catch (error) {
            console.warn("导入失败", error);
            window.alert("导入失败：文件不是有效的 JSON，或者结构不完整。");
          }
        };
        reader.readAsText(file);
      }

      function readFileAsImage(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = function () {
            resolve({
              id: uid("img"),
              name: file.name,
              dataUrl: reader.result
            });
          };
          reader.onerror = function () {
            reject(new Error("图片读取失败"));
          };
          reader.readAsDataURL(file);
        });
      }

      async function appendImages(collectionPath, itemIndex, files) {
        const collection = getByPath(state, collectionPath);
        if (!Array.isArray(collection) || !collection[itemIndex]) {
          return;
        }
        try {
          const images = await Promise.all(Array.from(files).map(readFileAsImage));
          collection[itemIndex].images = collection[itemIndex].images.concat(images);
          refreshAfterStructureChange();
        } catch (error) {
          console.warn("图片处理失败", error);
          window.alert("图片读取失败，请换一张图片再试。");
        }
      }

      function resetProject(mode) {
        const message = mode === "blank" ? "确定新建空白项目吗？当前内容会被覆盖。" : "确定恢复默认模板吗？当前内容会被覆盖。";
        if (!window.confirm(message)) {
          return;
        }
        state = createDefaultState(mode);
        saveStateLabel = "saved";
        saveMessage = mode === "blank" ? "已创建空白项目" : "已恢复默认模板";
        queueSave();
        renderApp();
      }

      function loadYaoraoSampleByAction() {
        if (!window.confirm("确定载入《妖娆召唤师》第一卷示例吗？当前内容会被覆盖。")) {
          return;
        }
        state = loadYaoraoSampleState("已手动载入《妖娆召唤师》第一卷示例");
        renderApp();
      }

      document.addEventListener("click", function (event) {
        const target = event.target.closest("[data-action]");
        if (!target) {
          return;
        }
        const action = target.dataset.action;
        if (action === "switch-tab") {
          activeTab = target.dataset.tab;
          renderApp();
          return;
        }
        if (action === "add-item") {
          addCollectionItem(target.dataset.collection);
          return;
        }
        if (action === "duplicate-item") {
          duplicateCollectionItem(target.dataset.collection, Number(target.dataset.index));
          return;
        }
        if (action === "delete-item") {
          deleteCollectionItem(target.dataset.collection, Number(target.dataset.index));
          return;
        }
        if (action === "toggle-collapse") {
          toggleCollapsed(target.dataset.collection, Number(target.dataset.index));
          return;
        }
        if (action === "scroll-to-item") {
          const el = document.getElementById(target.dataset.anchor);
          if (el) {
            el.scrollIntoView({ behavior: "smooth", block: "start" });
          }
          return;
        }
        if (action === "remove-image") {
          removeImage(target.dataset.collection, Number(target.dataset.index), Number(target.dataset.imageIndex));
          return;
        }
        if (action === "export-json") {
          exportJson();
          return;
        }
        if (action === "import-json") {
          importInput.click();
          return;
        }
        if (action === "print-page") {
          window.print();
          return;
        }
        if (action === "new-blank") {
          resetProject("blank");
          return;
        }
        if (action === "reset-template") {
          resetProject("template");
          return;
        }
        if (action === "load-yaorao-sample") {
          loadYaoraoSampleByAction();
        }
      });

      document.addEventListener("input", function (event) {
        const target = event.target;
        if (!target.matches("[data-path]")) {
          return;
        }
        if (target.type === "checkbox") {
          return;
        }
        updateField(target.dataset.path, target.value, false);
        if (target.tagName === "TEXTAREA") {
          target.style.height = "auto";
          target.style.height = Math.max(target.scrollHeight, 110) + "px";
        }
      });

      document.addEventListener("change", function (event) {
        const target = event.target;
        if (target.matches('input[type="checkbox"][data-path]')) {
          updateField(target.dataset.path, target.checked, true);
          return;
        }
        if (target.matches('select[data-path]')) {
          updateField(target.dataset.path, target.value, false);
          return;
        }
        if (target.matches('input[type="file"][data-upload-path]')) {
          appendImages(target.dataset.uploadPath, Number(target.dataset.itemIndex), target.files);
          target.value = "";
          return;
        }
      });

      importInput.addEventListener("change", function () {
        const file = importInput.files[0];
        importJson(file);
        importInput.value = "";
      });

      renderApp();
    })();
  </script>
</body>
</html>
